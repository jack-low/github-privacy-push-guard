name: privacy-guard

on:
  pull_request:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run local privacy guard
        run: python3 tools/privacy_guard.py --all-files --fail-on medium

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install TruffleHog
        env:
          TRUFFLEHOG_VERSION: 3.90.5
        run: |
          curl -sSfL "https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz" -o trufflehog.tar.gz
          tar -xzf trufflehog.tar.gz trufflehog
          sudo install -m 0755 trufflehog /usr/local/bin/trufflehog

      - name: Run TruffleHog verified scan
        run: trufflehog filesystem ./ --only-verified
