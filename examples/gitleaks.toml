title = "GitHub Privacy Push Guard"

[allowlist]
description = "Known-safe placeholders and examples only"
regexes = [
  '''<[^>]+_REDACTED>''',
  '''example\.com''',
  '''localhost''',
  '''127\.0\.0\.1'''
]

[[rules]]
id = "private-home-path"
description = "Local user home path"
regex = '''(?:/Users/|/home/)[A-Za-z0-9._-]+'''
tags = ["privacy", "local-path"]

[[rules]]
id = "private-ipv4"
description = "Private IPv4 address"
regex = '''\b(?:10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(?:1[6-9]|2\d|3[0-1])\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3})\b'''
tags = ["privacy", "network"]

[[rules]]
id = "dotenv-secret-assignment"
description = "Secret-like assignment"
regex = '''(?i)\b(password|passwd|pwd|secret|api[_-]?key|access[_-]?token|refresh[_-]?token)\b\s*[:=]\s*['\"]?[^'\"\s]{8,}'''
tags = ["secret", "config"]
